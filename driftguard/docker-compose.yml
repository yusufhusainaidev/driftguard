version: '3.8'

services:

  # ─────────────────────────────────────────
  # PostgreSQL — Main Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: driftguard_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-driftguard}
      POSTGRES_USER: ${POSTGRES_USER:-driftguard_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-driftguard_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - driftguard_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-driftguard_user} -d ${POSTGRES_DB:-driftguard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis — Reference Distribution Cache
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: driftguard_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_pass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - driftguard_network
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # MLflow — Model Tracking & Versioning
  # ─────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: driftguard_mlflow
    restart: always
    command: >
      bash -c "pip install mlflow psycopg2-binary boto3 --quiet &&
               mlflow server
               --backend-store-uri postgresql://${POSTGRES_USER:-driftguard_user}:${POSTGRES_PASSWORD:-driftguard_pass}@postgres:5432/${POSTGRES_DB:-driftguard}
               --default-artifact-root /mlflow/artifacts
               --host 0.0.0.0
               --port 5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    ports:
      - "5000:5000"
    networks:
      - driftguard_network
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────
  # FastAPI Backend — Core System Engine
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: driftguard_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-driftguard_user}:${POSTGRES_PASSWORD:-driftguard_pass}@postgres:5432/${POSTGRES_DB:-driftguard}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_pass}@redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
      SECRET_KEY: ${SECRET_KEY:-driftguard_secret_key_change_in_prod}
    volumes:
      - ./data:/app/data
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - driftguard_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Streamlit Dashboard — Frontend UI
  # ─────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: driftguard_dashboard
    restart: always
    environment:
      API_BASE_URL: http://backend:8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-driftguard_user}:${POSTGRES_PASSWORD:-driftguard_pass}@postgres:5432/${POSTGRES_DB:-driftguard}
    volumes:
      - ./dashboard:/app
    ports:
      - "8501:8501"
    networks:
      - driftguard_network
    depends_on:
      - backend

# ─────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  mlflow_artifacts:
    driver: local

# ─────────────────────────────────────────
# Network
# ─────────────────────────────────────────
networks:
  driftguard_network:
    driver: bridge
